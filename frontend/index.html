<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideShare Live Tracking | Real-Time Vehicle Monitoring</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Status Panel - Glassmorphism -->
    <div class="status-panel">
        <div class="panel-header">
            <div class="panel-title">Live Tracking</div>
        </div>

        <!-- Connection Status -->
        <div class="connection-status disconnected">
            <div class="status-dot"></div>
            <div class="status-text">Connecting...</div>
        </div>

        <!-- Vehicle Count -->
        <div class="vehicle-count">
            <div class="count-label">Active Vehicles</div>
            <div class="count-value">0</div>
        </div>

        <!-- Update Feed -->
        <div class="update-feed">
            <div class="feed-title">Recent Updates</div>
            <div class="feed-item">
                <span class="vehicle-id">System</span>: Initializing...
            </div>
        </div>
    </div>

    <!-- Branding -->
    <div class="branding">
        <h1>🚗 RideShare</h1>
        <p>Real-Time Vehicle Tracking System</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
